<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - FinSwip</title>
    <link rel="stylesheet" href="contact-styles.css">
    <style>
        #success-msg {
            display: none;
            background-color: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #bbf7d0;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <nav class="navbar">
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="vision.html">Our Vision</a></li>
            <li><a href="contact.html" class="active">Contact Us</a></li>
        </ul>
    </nav>

    <div class="contact-container">

        <div class="image-section">
            <img src="icon.png" alt="FinSwip Logo">
        </div>

        <div class="details-section">

            <h1>Contact Us</h1>

            <div class="left-contact">
                <p>📧 <a href="mailto:finswip@gmail.com">finswip@gmail.com</a></p>
                <p>📞 <a href="tel:+919891328610">+91 98913 28610</a></p>
            </div>

            <div class="premium-form">

                <h2>For Feedback, Suggestions & Business Enquiry</h2>
                <br>

                <form id="contact-form" action="https://formspree.io/f/mgopzple" method="POST">

                    <input type="text" name="name" placeholder="Your Name" required>

                    <input type="email" name="email" placeholder="Email Address" required>

                    <select name="topic" required>
                        <option value="">Select Topic</option>
                        <option>App Feedback</option>
                        <option>Feature Request</option>
                        <option>Bug Report</option>
                        <option>Partnership / Business</option>
                    </select>

                    <textarea name="message" placeholder="Tell us what’s on your mind..." required></textarea>

                    <button type="submit" id="submit-btn">SEND MESSAGE</button>

                </form>

                <div id="success-msg">✅ Message sent successfully! We will get back to you soon.</div>

            </div>
            <div class="left-contact">

    <p>
        <i class="fas fa-shield-alt"></i>
        <a href="privacy-policy.html">Privacy Policy</a>
    </p>

    <p>
        <i class="fas fa-file-contract"></i>
        <a href="terms-and-contiions.html">Terms & Conditions</a>
    </p>

</div>

        </div>

    </div>

    <script>
        const form = document.getElementById("contact-form");
        const successMsg = document.getElementById("success-msg");
        const submitBtn = document.getElementById("submit-btn");

        form.addEventListener("submit", async function (event) {
            // Stop the form from redirecting to Formspree
            event.preventDefault(); 

            // Show loading state on button
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = "SENDING...";
            submitBtn.disabled = true;

            const data = new FormData(event.target);

            try {
                const response = await fetch(event.target.action, {
                    method: form.method,
                    body: data,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    // Show success message and clear form
                    successMsg.style.display = "block";
                    form.reset();
                    
                    // Hide message after 5 seconds
                    setTimeout(() => {
                        successMsg.style.display = "none";
                    }, 5000);
                } else {
                    alert("Oops! There was a problem submitting your form.");
                }
            } catch (error) {
                alert("Oops! There was a network error. Please check your connection.");
            }

            // Restore button state
            submitBtn.innerText = originalBtnText;
            submitBtn.disabled = false;
        });

        // Clear form if user navigates back using browser arrows
        window.addEventListener("pageshow", function (event) {
            if (form) {
                form.reset();
            }
        });
    </script>

</body>

</html>
